version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: mysql-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: kavya@2006
      MYSQL_DATABASE: recipes_db
    ports:
      - "3000:3000"
    volumes:
      - mysql-data:/var/lib/mysql

  app:
    image: kavyanjali14/recipes:latest
    container_name: recipe-container
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: kavya@2006
      DB_NAME: recipes_db

volumes:
  mysql-data: